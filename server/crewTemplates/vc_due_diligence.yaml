metadata:
  id: vc_due_diligence
  label: VC Due Diligence
  description: 'Seven-stage VC investment analysis pipeline modelled on the Bionic ADK

    reference crew. Stages: Company Research → Market Analysis → Financial

    Modeling → Risk Assessment → Investor Memo → Report → Notify. Two

    Search MCP passes (company + market), five LLM calls. Slower than

    "Due Diligence Bot" but produces a full investment-grade dossier with

    Bear/Base/Bull projections, competitor map, risk score, and recommendation.

    Final dossier is rendered as a McKinsey-style PDF and dispatched via

    Gmail SMTP relay + webhook.

    '
  mode: workflow
  icon: 💼
  configSchema:
  - key: notify_email
    label: Analyst Email
    type: email
    required: false
    placeholder: analyst@bionicaisolutions.com
    description: Recipient for the completed dossier (PDF attached)
  - key: notify_webhook
    label: Notification Webhook (optional)
    type: url
    required: false
    placeholder: https://hooks.slack.com/services/...
    description: Slack/Teams/etc. webhook for the dossier summary
  postInstall: none
