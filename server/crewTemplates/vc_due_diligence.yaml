      - data:
          title: Extract Company Search
          type: code
          code_language: python3
          code: "import json\ndef main(body: str) -> dict:\n    try:\n        d = json.loads(body)\n        results = d.get(\"results\", [])\n        formatted = \"\\n\\n\".join(\n            f\"[{i+1}] {r.get('title','')} \u2014 {r.get('url','')}\\n{r.get('snippet','')}\"\n            for i, r in enumerate(results)\n        )\n        return {\"sources\": formatted or \"(no results)\", \"count\": len(results)}\n    except Exception as e:\n        return {\"sources\": f\"Error: {e}\", \"count\": 0}\n"
          variables:
          - variable: body
            value_selector:
            - search_company
            - body
          outputs:
            sources:
              type: string
            count:
              type: number
          desc: ''
          selected: false
