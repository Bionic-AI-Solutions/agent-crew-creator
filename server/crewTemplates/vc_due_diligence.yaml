      - data:
          title: Build Company Payload
          type: code
          code_language: python3
          code: "import json\ndef main(company: str, website: str, notes: str, sources: str) -> dict:\n    payload = {\n        \"model\": \"qwen3.5-27b-fp8\",\n        \"messages\": [\n            {\"role\": \"system\", \"content\": \"You are a senior VC investment analyst conducting company research. Extract: 1) Company basics (what they do, founded when, HQ, team size) 2) Founders & key people with backgrounds 3) Product/Technology core offering 4) Funding history (rounds, investors, amounts) 5) Traction (customers, partnerships, growth signals) 6) Recent news. Be thorough but realistic about what's publicly available. For early-stage companies, note information gaps explicitly. Output structured prose.\"},\n            {\"role\": \"user\", \"content\": f\"Company: {company}\\nWebsite: {website}\\nUser notes: {notes}\\n\\nSources:\\n{sources}\\n\\nProduce the company research.\"}\n        ],\n        \"temperature\": 0.3,\n        \"max_tokens\": 3000\n    }\n    return {\"payload\": json.dumps(payload)}\n"
          variables:
          - variable: company
            value_selector:
            - start
            - company_name
          - variable: website
            value_selector:
            - start
            - website_url
          - variable: notes
            value_selector:
            - start
            - notes
          - variable: sources
            value_selector:
            - extract_company_search
            - sources
          outputs:
            payload:
              type: string
          desc: ''
          selected: false
