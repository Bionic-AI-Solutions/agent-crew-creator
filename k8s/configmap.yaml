apiVersion: v1
kind: ConfigMap
metadata:
  name: bionic-platform-config
  namespace: bionic-platform
data:
  PORT: "3000"
  NODE_ENV: production

  # ── Keycloak ─────────────────────────────────────────────────
  # Public URL (for browser OIDC redirects)
  KEYCLOAK_URL: https://auth.bionicaisolutions.com
  KEYCLOAK_REALM: Bionic
  KEYCLOAK_REDIRECT_URI: https://platform.baisoln.com/api/auth/callback
  # Internal URL (for admin API calls — no Kong hop)
  KEYCLOAK_INTERNAL_URL: http://keycloak.keycloak.svc.cluster.local:80

  # ── Vault ────────────────────────────────────────────────────
  VAULT_ADDR: http://vault-internal.vault.svc.cluster.local:8200

  # ── LiveKit ──────────────────────────────────────────────────
  # External URL (for browser WebRTC clients)
  LIVEKIT_URL: wss://livekit.bionicaisolutions.com
  # Internal URL (for agent pods — no TLS hop)
  LIVEKIT_INTERNAL_URL: ws://livekit-server.livekit.svc.cluster.local:7880
  K8S_LIVEKIT_NAMESPACE: livekit
  LIVEKIT_KEYS_SECRET_NAME: livekit-api-keys

  # ── Letta ────────────────────────────────────────────────────
  # Internal URL (server-to-server)
  LETTA_BASE_URL: http://letta-server.letta.svc.cluster.local:8283
  LETTA_INTERNAL_URL: http://letta-server.letta.svc.cluster.local:8283

  # ── Langfuse ─────────────────────────────────────────────────
  # External (for dashboard links shown to users)
  LANGFUSE_HOST: https://langfuse.bionicaisolutions.com
  # Internal (for agent telemetry — no Kong hop)
  LANGFUSE_INTERNAL_URL: http://langfuse-web.langfuse.svc.cluster.local:3000

  # ── GPU-AI MCP ───────────────────────────────────────────────
  # Internal (for agent STT/TTS — no Kong hop)
  GPU_AI_MCP_INTERNAL_URL: http://mcp-ai-mcp-server.mcp.svc.cluster.local:8009/mcp

  # ── MinIO ────────────────────────────────────────────────────
  MINIO_ENDPOINT: minio-tenant-hl.minio.svc.cluster.local:9000
  MINIO_USE_SSL: "false"

  # ── Redis ────────────────────────────────────────────────────
  REDIS_URL: redis://redis-cluster.redis.svc.cluster.local:6379

  # ── Webhooks (external, needs public URL) ────────────────────
  WEBHOOK_BASE_URL: https://platform.baisoln.com

  # ── Agent deployment ─────────────────────────────────────────
  # Agents deploy to their app's namespace (e.g., guruji, physics-tutor)
  AGENT_TEMPLATE_IMAGE: docker4zerocool/bionic-agent:latest
