apiVersion: v1
kind: ConfigMap
metadata:
  name: dify-config
  namespace: bionic-platform
  labels:
    app: dify
    app.kubernetes.io/managed-by: bionic-platform
data:
  # Core
  MODE: "api"
  SECRET_KEY: "${DIFY_SECRET_KEY}"
  CONSOLE_WEB_URL: ""
  CONSOLE_API_URL: ""
  SERVICE_API_URL: ""

  # Database — shared platform Postgres (CloudNativePG)
  DB_USERNAME: "postgres"
  DB_PASSWORD: "${PG_PASSWORD}"
  DB_HOST: "pg-ceph-rw.pg.svc.cluster.local"
  DB_PORT: "5432"
  DB_DATABASE: "dify"

  # Redis
  REDIS_HOST: "redis-livekit.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "1"

  # Storage — MinIO
  STORAGE_TYPE: "s3"
  S3_ENDPOINT: "http://minio-tenant-hl.minio.svc.cluster.local:9000"
  S3_BUCKET_NAME: "bionic-dify"
  S3_USE_AWS_MANAGED_IAM: "false"

  # Plugin Daemon
  PLUGIN_API_URL: "http://dify-plugin-daemon.bionic-platform.svc.cluster.local:5002"
  PLUGIN_API_KEY: "${DIFY_SECRET_KEY}"
  PLUGIN_DAEMON_URL: "http://dify-plugin-daemon.bionic-platform.svc.cluster.local:5002"
  PLUGIN_DAEMON_KEY: "${DIFY_SECRET_KEY}"
  INNER_API_KEY: "${DIFY_INNER_API_KEY}"
  FORCE_VERIFYING_SIGNATURE: "false"

  # Embedding
  NEXT_PUBLIC_ALLOW_EMBED: "true"

  # Logging
  LOG_LEVEL: "INFO"
