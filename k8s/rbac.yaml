---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bionic-platform-sa
  namespace: bionic-platform
---
# ClusterRole: manage namespaces, deployments, configmaps, secrets, externalsecrets across cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bionic-platform-manager
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  # ConfigMap/Secret/ServiceAccount management in any namespace
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "serviceaccounts", "resourcequotas"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Deployment management in any namespace
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Service + Ingress (agent player UI per app namespace)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # In-cluster health checks for player_ui verification (API server proxy)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["services/proxy", "pods/proxy"]
    verbs: ["get", "create"]
  # ExternalSecrets management
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bionic-platform-manager-binding
subjects:
  - kind: ServiceAccount
    name: bionic-platform-sa
    namespace: bionic-platform
roleRef:
  kind: ClusterRole
  name: bionic-platform-manager
  apiGroup: rbac.authorization.k8s.io
