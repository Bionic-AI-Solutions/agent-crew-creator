apiVersion: apps/v1
kind: Deployment
metadata:
  name: bionic-platform
  namespace: bionic-platform
  labels:
    app: bionic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bionic-platform
  template:
    metadata:
      labels:
        app: bionic-platform
    spec:
      serviceAccountName: bionic-platform-sa
      containers:
        - name: platform
          image: docker4zerocool/bionic-platform:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: bionic-platform-config
          env:
            # Map Vault secret keys to the env var names the server expects
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: database_url
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: session_secret
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: keycloak_client_id
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: keycloak_client_secret
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: keycloak_admin_user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: keycloak_admin_password
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: vault_token
            - name: LETTA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: letta_api_key
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: minio_root_user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: minio_root_password
            - name: PG_ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: pg_admin_url
            - name: LANGFUSE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: langfuse_admin_password
            - name: LANGFUSE_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: langfuse_org_id
            - name: LANGFUSE_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: langfuse_db_host
            - name: NOTIFY_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bionic-platform-secrets
                  key: notify_webhook_token
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
